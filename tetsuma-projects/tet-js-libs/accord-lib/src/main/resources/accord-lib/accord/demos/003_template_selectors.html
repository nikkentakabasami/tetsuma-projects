<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />

<script src="../../jquery31/js/jquery.js"></script>

<link rel="stylesheet" type="text/css" href="../css/accord.css">
<link rel="stylesheet" type="text/css" href="../css/tabbed-panel.css">
<link rel="stylesheet" type="text/css" href="../css/acc-form-elements.css">
<link rel="stylesheet" type="text/css" href="../css/demo-base.css">
<script src="../js/demo-base-log.js"></script>
<script src="../js/demo-base.js"></script>

<script type="module" src="../js/accord-publish.js"></script>

<script src="js/003-demo.js"></script>


</head>
<body class="acc-default-font">

  <div class="basePanel">

    <div class="titlePanel">
      <h2>Шаблон для тестирования селекторов</h2>
    </div>

    <div class="auxPanel">

      <div class="logPanel gray-border">
        <div id="log1"></div>
      </div>

      <div class="logPanel gray-border">
        <div id="log2"></div>
      </div>

    </div>




    <div class="acc-button-panel">

      <div class="acc-left-content">Обработчики1</div>
      <div class="acc-tool-panel-select-wrapper">
        <select id="selectors1" class="acc-tool-panel-select" style="width: 200px;">
        </select>
      </div>



    </div>


    <div class="acc-button-panel">
      <div class="acc-centered-content">Текущий селектор:</div>
      <input type="text" id="selectorText" />

      <button id="bExecute" type="button" class="acc-btn">Выполнить</button>
      <button id="bReload" type="button" class="acc-btn">Перезагрузить песочницу</button>
      
      <div class="acc-filler-panel"></div>      
      
      <button id="bClearLog" type="button" class="acc-btn">Очистить лог</button>


    </div>

    <!--               work panel                -->

    <div class="workPanel label-border"></div>


  </div>



<template id="template1">

    <div  class="form-panel acc-form-style1">
        <div class="form-group">
          <label>inp1:</label>
          <input type="text"  id="inp1">
        </div>

        <div class="form-group">
          <label>inp2:</label>
          <input type="text"  id="inp2">
        </div>
      
        <div class="form-group">
          <label>inp3:</label>
          <select  id="inp3">
            <option>Banana</option>
            <option>Cherry</option>
            <option>Lemon</option>
          </select>
        </div>
      
        <div class="acc-row acc-form-button-panel1">
          <button class="acc-btn" id="btn1">Ok</button>
          <button class="acc-btn" id="btn2">Cancel</button>
        </div>
    </div>


</template>

</body>
</html>
