<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />

<script src="../../jquery31/js/jquery.js"></script>
<link rel="stylesheet" type="text/css" href="../css/accord.css">
<script type="module" src="../js/accord-publish.js"></script>
<link rel="stylesheet" type="text/css" href="../css/demo-base.css">
<link rel="stylesheet" type="text/css" href="../css/acc-form-elements.css">

<script type="text/javascript" src="js/004-demo.js"></script>


</head>

<body class="acc-default-font">

  <div class="basePanel">

    <div class="titlePanel">
      <h2>Самый примитивный шаблон (без логов и автокнопок)</h2>
    </div>


    <div class="acc-button-panel">
      <button id="b1" type="button" class="acc-btn">кнопка1</button>
      <button id="b2" type="button" class="acc-btn">кнопка2</button>
      <button id="b3" type="button" class="acc-btn">кнопка3</button>
    </div>

    <div class="workPanel">

      <div class="acc-2cols">
        <div>

          <div class="form-panel acc-2cols acc-form-style1">

            <label>First name:</label>
            <input type="text" value="John">

            <label>Select box:</label>
            <select>
              <option>Banana</option>
              <option>Cherry</option>
              <option>Lemon</option>
            </select>
            <div class="acc-row acc-form-button-panel1">
              <button class="acc-btn">Ok</button>
              <button class="acc-btn">Cancel</button>
            </div>


          </div>

        </div>
      </div>


    </div>



  </div>


</body>
</html>
