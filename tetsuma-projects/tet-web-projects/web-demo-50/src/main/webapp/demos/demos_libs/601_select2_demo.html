        <label>Обычный select</label>
        <select id="select1">
          <option value="">-</option>
          <option value="1">Banana</option>
          <option value="2">Cherry</option>
          <option value="3">Lemon</option>
        </select>
        
        <label>Select2 - все значения по умолчанию</label>
        <select id="select2">
          <option value="">-</option>
          <option value="1">Banana</option>
          <option value="2">Cherry</option>
          <option value="3">Lemon</option>
        </select>
        

        <label>Select2 - bugged layout</label>
        <select id="select3">
        </select>

      <h4 class="acc-row">простая форма</h4>

        <label>Select2 - loads options from data</label>
        <select id="select10">
        </select>


        <label>Select2 - multiselect</label>
        <select id="select11" multiple="multiple" >
          <option value="1">Banana</option>
          <option value="2">Cherry</option>
          <option value="3">Lemon</option>
          <option value="4">Sugar</option>
          <option value="5">Apple</option>
