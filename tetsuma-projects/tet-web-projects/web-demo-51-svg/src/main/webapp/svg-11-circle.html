	<svg width="600" height="200" id="svg1">

	</div>

	<div class="svg-code svg2desc"></div>

	<svg width="600" height="300" id="svg2">
  
<ellipse cx="100" cy="50" rx="100" ry="50"
  style="fill:yellow;stroke:purple;stroke-width:2" />

<ellipse cx="100" cy="200" rx="50" ry="50"
  style="fill:blue;stroke:purple;stroke-width:2" />

  
	</svg>
