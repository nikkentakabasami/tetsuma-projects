<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/html">
<head>
<meta charset="UTF-8" />
<title>stroke-linecap, stroke-dasharray</title>

<script src="../../jquery31/js/jquery.js"></script>
<link rel="stylesheet" type="text/css" href="../css/svg-aux.css">
<script type="text/javascript" src="../js/svg-aux.js"></script>

</head>
<body>

  <!-- button panel -->
  <div class="acc-button-panel">
    <button type="button" class="acc-btn">do something</button>
  </div>

  <!-- description -->
	<div class="acc-desc-panel">
<b>stroke-linecap</b>

butt - обрезанная (будет чуть короче)
round - закруглённая
square - квадратная

	</div>

  <!-- svg1 -->
	<svg class="demo-svg-200" id="svg1">

  <g fill="none" stroke="black" stroke-width="6">
    <path stroke-linecap="butt" d="M5 20 l215 0" />
    <path stroke-linecap="round" d="M5 40 l215 0" />
    <path stroke-linecap="square" d="M5 60 l215 0" />
  </g>

	</svg>

  <!-- description -->
	<div class="acc-desc-panel">
<b>stroke-dasharray</b>
  Позволяет создавать пунктирные линии.
  В неё задаются длины чёрточек и пробелов между ними.


	</div>

  <!-- svg2 -->
	<svg class="demo-svg-200" id="svg2">

  <g fill="none" stroke="black" stroke-width="4">
    <path stroke-dasharray="5,5" d="M10 20 l200 0" />
    <path stroke-dasharray="10,10" d="M10 40 l200 0" />
    <path stroke-dasharray="10,20" d="M10 60 l200 0" />
    <path stroke-dasharray="20,10,5,5,5,10" d="M10 80 l200 0" />
    
  </g>

	</svg>


</body>
</html>
