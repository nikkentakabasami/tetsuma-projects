<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />

<link rel="stylesheet" type="text/css" href="../../accord/css/accord.css">
<link rel="stylesheet" type="text/css" href="../../accord/css/tabbed-panel.css">
<link rel="stylesheet" type="text/css" href="../css/demo-base.css">
<link rel="stylesheet" type="text/css" href="../css/demo901.css">

<script src="../../jquery31/js/jquery.js"></script>
<script type="module" src="../../accord/js/accord-publish.js"></script>
<script src="../js/demo-base.js"></script>
<script src="../js/901-demo.js"></script>

</head>
<body class="acc-default-font">

  <div class="basePanel">

    <div class="titlePanel">
      <h2>тестовый splitter - изменение размера вручную</h2>
      <button id="hideAuxButton" type="button" class="acc-btn">Скрыть описание</button>
      <a href="#" target="source">Исходники</a>
    </div>

    <div class="auxPanel">
      <div id="tabbedPanel1" class="tabbed-panel">

        <div class="tab-container">
          <button class="tab active" data-tab="1">Описание</button>
          <button class="tab" data-tab="2">Ключевой код</button>
          <div class="tab-filler"></div>
        </div>

        <div id="tab-1" class="tab-content active">
          <pre class="acc-desc-panel">
  описание
</pre>
        </div>

        <div id="tab-2" class="tab-content">
          <pre class="acc-code-panel">
  код
</pre>
        </div>

      </div>

      <div class="logPanel gray-border">
        <div id="log1"></div>
      </div>

    </div>


    <!--               button panel                -->

    <div class="acc-button-panel">
      <button id="b1" type="button" class="acc-btn">кнопка1</button>
      <button id="b2" type="button" class="acc-btn">кнопка2</button>
    </div>

    <!--               work panel                -->

    <div class="workPanel">

      <div class="splitter-panel">
        <div class="sp-left acc-simple-panel">Left Panel</div>
        <div class="sp-resizer"></div>
        <div class="sp-right acc-simple-panel">Right Panel</div>

      </div>

    </div>



  </div>


</body>
</html>
