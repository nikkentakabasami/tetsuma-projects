<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" type="text/css" href="../css/demo3.css">

</head>
<body>

<h3>элементы формы со стилями по умолчанию</h3>

  <div class="dfgrid">

    <div>
      <form action=".">
        <label for="fname">First name:</label>
        <br>
        <input type="text" value="John" autocomplete="off">
        <br>
        <label for="lname">Last name:</label>
        <br>
        <input type="text" value="Doe" autocomplete="off">
        <br>
        <input type="radio" value="HTML">
        <label for="html">HTML</label>
        <br>
        <input type="radio" value="CSS">
        <label for="css">CSS</label>
        <br>
        <input type="radio" value="JavaScript">
        <label for="javascript">JavaScript</label>
        <br>
        <input type="checkbox" value="Bike">
        <label for="vehicle1"> I have a bike</label>
        <br>
        <input type="checkbox" value="Car">
        <label for="vehicle2"> I have a car</label>
        <br>
        <input type="checkbox" value="Boat">
        <label for="vehicle3"> I have a boat</label>

        <br>
        <input type="submit" value="Submit">

      </form>

    </div>

    <div>

      <form action="/action_page.php">
        <label for="cars">Choose a car:</label>
        <select name="cars">
          <option value="volvo">Volvo</option>
          <option value="saab">Saab</option>
          <option value="fiat">Fiat</option>
          <option value="audi">Audi</option>
        </select>
        <br>
        <label for="cars">Choose a car:</label>
        <select multiple>
          <option value="volvo">Volvo</option>
          <option value="saab">Saab</option>
          <option value="fiat">Fiat</option>
          <option value="audi">Audi</option>
        </select>
        <br>

        <input type="submit">
      </form>

    </div>

    <div>


      <form action="/action_page.php" oninput="x.value=parseInt(a.value)+parseInt(b.value)">
        <h3>output</h3>
        <input type="range" value="50">100
        <br>
        +
        <br>

        <input type="number" value="50"> =
        <output name="x" for="a b"></output>
        <br>
        <br>
        <input type="submit">
      </form>

    </div>

    <div>

      <h3>form attribue - inputs can be outside form!</h3>


      <form action="/action_page.php" id="form1">
        <label for="fname">First name:</label>
        <input type="text" name="fname">
        <br>
        <br>
        <input type="submit" value="Submit">
      </form>

      <p>The "Last name" field below is outside the form element, but still part of the form.</p>

      <label for="lname">Last name:</label>
      <input type="text" form="form1">

    </div>

    <div>
      <form>
        <fieldset>
          <legend>Fruit juice size</legend>
          <p>
            <input type="radio" name="size" />
            <label for="size_1">Small</label>
          </p>
          <p>
            <input type="radio" name="size" />
            <label for="size_2">Medium</label>
          </p>
          <p>
            <input type="radio" name="size" />
            <label for="size_3">Large</label>
          </p>
        </fieldset>
      </form>

    </div>


    <div>
      <form>
        <p>
          <label for="taste_1">I like cherry</label>
          <input type="checkbox" />
        </p>
        <p>
          <label for="taste_2">I like banana</label>
          <input type="checkbox" />
        </p>

        <section>
          <h2>Contact information</h2>
          <fieldset>
            <legend>Title</legend>
            <ul>
              <li><label for="title_1">
                  <input type="radio" /> Mister
                </label></li>
              <li><label for="title_2">
                  <input type="radio" /> Miss
                </label></li>
            </ul>
          </fieldset>
          <p>
            <label for="name">
              <span>Name: </span> <strong><abbr title="required">*</abbr></strong>
            </label>
            <input type="text" />
          </p>
          <p>
            <label for="mail">
              <span>E-mail: </span> <strong><abbr title="required">*</abbr></strong>
            </label>
            <input type="email" />
          </p>
          <p>
            <label for="pwd">
              <span>Password: </span> <strong><abbr title="required">*</abbr></strong>
            </label>
            <input type="password"/>
          </p>
        </section>

        <section>
          <h2>Payment information</h2>
          <p>
            <label for="card">
              <span>Card type:</span>
            </label>
            <select name="usercard">
              <option value="visa">Visa</option>
              <option value="mc">Mastercard</option>
              <option value="amex">American Express</option>
            </select>
          </p>
          <p>
            <label for="number">
              <span>Card number:</span> <strong><abbr title="required">*</abbr></strong>
            </label>
            <input type="number" />
          </p>
          <p>
            <label for="date">
              <span>Expiration date:</span> <strong><abbr title="required">*</abbr></strong> <em>formatted as mm/yy</em>
            </label>
            <input type="date" />
          </p>
        </section>

      </form>
    </div>

    <div></div>




  </div>









</body>
</html>
