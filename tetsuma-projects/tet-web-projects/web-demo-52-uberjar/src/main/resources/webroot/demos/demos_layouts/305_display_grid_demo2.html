<style>

<style id="style1">

.d2 {
  display: grid;
  grid-auto-rows: minmax(50px, auto);
  grid-template-columns: 1fr;
  grid-template-areas: "hd" "main" "sd" "ft";
}

@media ( min-width : 500px) {
  .d2 {
    grid-template-columns: repeat(9, 1fr);
    grid-template-areas: "hd hd hd hd   hd   hd   hd   hd   hd"
      "sd sd sd main main main main main main"
      "sd sd sd  ft  ft   ft   ft   ft   ft";
  }
}

@media ( min-width : 700px) {
  .d2 {
    grid-template-areas: "hd hd hd   hd   hd   hd   hd   hd hd"
      "sd sd main main main main main ft ft";
  }
}



</style>

</head>
<body>



  
<h3 class="red">grid-template-areas</h3>
<p>
Задание положения элементов макетом.
<br>minmax(min, max) - функция, задающая диапазон размеров от min до max.
</p>
  <h3>-</h3>
  <div class="wrapper" 
    style="
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    grid-auto-rows: minmax(50px, auto);
    grid-template-areas: 
      'hd hd hd hd   hd   hd   hd   hd   hd' 
      'sd sd sd main main main main main main' 
      'ft ft ft ft   ft   ft   ft   ft   ft';">
  
    <div style="grid-area: hd;">Header</div>
    <div style="grid-area: sd;">Sidebar</div>
    <div style="grid-area: main;">Content</div>
    <div style="grid-area: ft;">Footer</div>
  </div>

<h3 class="red">@media</h3>
<p>
@media - меняем макет в зависимости от ширины экрана    
</p>


  <h4 data-style-element="style1">-</h4>

  <div class="wrapper d2">
    <div style="grid-area: hd;">Header</div>
    <div style="grid-area: sd;">Sidebar</div>
    <div style="grid-area: main;">Content</div>
    <div style="grid-area: ft;">Footer</div>
  </div>
