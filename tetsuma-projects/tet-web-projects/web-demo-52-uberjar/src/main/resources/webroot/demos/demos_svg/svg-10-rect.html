<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/html">
<head>
<meta charset="UTF-8" />
<title>rect - прямоугольник</title>

<script src="../../jquery31/js/jquery.js"></script>
<link rel="stylesheet" type="text/css" href="../css/svg-aux.css">
<script type="text/javascript" src="../js/svg-aux.js"></script>


</head>
<body>

	<div class="acc-desc-panel">
<b>rect - прямоугольник</b>

width, height
x, y
  размеры и координаты

rx, ry
  закругление краёв
	</div>


  <!-- svg1 -->
	<svg class="demo-svg-400" id="svg1">

<rect width="200" height="100" style="fill:rgb(0,0,255);stroke-width:3;stroke:rgb(0,0,0)" />

<rect x="50" y="50" width="200" height="100"
  style="fill:blue;stroke:pink;stroke-width:5;fill-opacity:0.1;stroke-opacity:0.9" />

<!-- С прозрачностью всего элемента -->
<rect x="80" y="80" width="150" height="150"
  style="fill:green;stroke:red;stroke-width:5;opacity:0.5" />

<!-- С закруглёнными краями -->
  <rect x="300" y="50" rx="20" ry="20" width="150" height="100"
  style="fill:red;stroke:black;stroke-width:5" />

	</svg>



</body>
</html>
