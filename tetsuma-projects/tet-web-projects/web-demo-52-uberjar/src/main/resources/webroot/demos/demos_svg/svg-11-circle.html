<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/html">
<head>
<meta charset="UTF-8" />
<title>circle</title>

<script src="../../jquery31/js/jquery.js"></script>
<link rel="stylesheet" type="text/css" href="../css/svg-aux.css">
<script type="text/javascript" src="../js/svg-aux.js"></script>




</head>
<body>

	<div class="acc-desc-panel">
<b>circle</b>
cx, cy - координаты центра
r - радиус


	</div>

	<svg class="demo-svg-400" id="svg1">
<circle cx="40" cy="40" r="40" stroke="black" stroke-width="3" fill="red" />
	</svg>





	<div class="acc-desc-panel">

<b>ellipse</b>
cx, cy - координаты центра эллипса.
rx - горизонтальный радиус (default 0)
ry - вертикальный радиус (default 0)

	</div>

	<svg class="demo-svg-400" id="svg2">
  
<ellipse cx="100" cy="50" rx="100" ry="50"
  style="fill:yellow;stroke:purple;stroke-width:2" />

<ellipse cx="350" cy="100" rx="50" ry="50"
  style="fill:blue;stroke:purple;stroke-width:2" />

  
	</svg>






</body>
</html>
