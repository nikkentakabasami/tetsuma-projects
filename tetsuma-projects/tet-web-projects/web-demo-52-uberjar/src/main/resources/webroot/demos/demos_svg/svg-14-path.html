  <!-- button panel -->
  <div class="acc-button-panel">

     <select id="gridType" style="width: 200px;">
       <option value="" >-</option>
       <option value="grid-net-10-2" >10 пикселей</option>
       <option value="grid-net-20" selected="selected" >20 пикселей</option>
       <option value="grid-net-50" >50 пикселей</option>
     </select>
    <button type="button" class="acc-btn">do something</button>

	<div class="acc-desc-panel">
<b>path</b>
  Элемент общего назначения.
Позволяет рисовать фигуры и линии.

  При задании пути используются команды:

M - moveto
M x y
m dx dy

L - lineto
L x y
l dx dy

H - horizontal lineto
V - vertical lineto
H x 
h dx
V y
v dy

Z - закрыть путь
	</div>

	<svg class="demo-svg-400" id="svg1">


<path d="M20 0 v 100 h 50 v -50 Z" fill="blue" />
	
<path d="M150 0 L75 200 L225 200 Z" />
 
<g transform="translate(200)">
  <path d="M 150 0 L 75 200 L225 200 Z" stroke="red" stroke-width="3" fill="none"/>
</g>
 
 
 
	</svg>
