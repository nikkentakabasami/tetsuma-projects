<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/html">
<head>
<meta charset="UTF-8" />
<title>My notes</title>

<script src="../../jquery31/js/jquery.js"></script>
<link rel="stylesheet" type="text/css" href="../css/svg-aux.css">
<script type="text/javascript" src="../js/svg-aux.js"></script>

<style>
svg > rect:hover {
  fill: green;
}
</style>

</head>
<body>


	<div class="acc-desc-panel">
<b>clipPath</b>
  Определяет прорисовываемую область

  Содержит в себе области, входящие в область отрисовки.
Они могут задаваться фигурами (circle, rect) либо тегом use (ссылка на имеющийся набор фигур)

	</div>

	<svg class="demo-svg-400" id="svg1">
	
	
  <defs>
    <clipPath id="myClip">
      <circle cx="30" cy="30" r="20"/>
      <circle cx="70" cy="70" r="20"/>
    </clipPath>
  </defs>

  <rect x="10" y="10" width="100" height="100"
      clip-path="url(#myClip)"/>



	</svg>

	<svg class="demo-svg-400" id="svg2">
  <defs>
    <clipPath id="myClip2">
      <rect x="0" y="10" width="100" height="35" />
      <rect x="0" y="55" width="100" height="35" />
    </clipPath>
  </defs>
  <circle cx="50" cy="50" r="50" fill="blue" clip-path="url(#myClip2)" />
  
  <rect x="0" y="10" width="100" height="35" fill="red" style="opacity:0.1"/>
  <rect x="0" y="55" width="100" height="35" fill="red" style="opacity:0.1"/>
  
	</svg>


</body>
</html>
