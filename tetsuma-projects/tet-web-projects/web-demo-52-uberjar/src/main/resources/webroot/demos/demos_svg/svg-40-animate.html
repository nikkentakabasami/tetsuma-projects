<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/html">
<head>
<meta charset="UTF-8" />
<title>animate</title>

<script src="../../jquery31/js/jquery.js"></script>
<link rel="stylesheet" type="text/css" href="../css/svg-aux.css">
<script type="text/javascript" src="../js/svg-aux.js"></script>

</head>
<body>

  <!-- button panel -->
  <div class="acc-button-panel">
    <button type="button" class="acc-btn">do something</button>
  </div>

  <!-- description -->
	<div class="acc-desc-panel">
<b>animate</b>
  анимирует атрибут элемента

	</div>

  <!-- svg1 -->
	<svg class="demo-svg-400" id="svg1">

  <circle cx="40" cy="40" r="20" style="fill:red;">
    <animate
      attributeName="cx"
      begin="0s"
      dur="8s"
      from="40"
      to="90%"
      repeatCount="indefinite" />
  </circle>
  
  
  <circle cx="40" cy="120" r="20" style="fill:red;">
    <animate
      attributeName="cx"
      begin="0s"
      dur="4s"
      from="40"
      to="160"
      fill="freeze" />
  </circle>  
  
  
  
	</svg>



	<div class="acc-desc-panel">
<b>animateTransform</b>
  анимирует атрибут transform
  
  
<b>animateMotion</b>
   Задаёт движение по заданному пути
  
	</div>

  <!-- svg2 -->
	<svg class="demo-svg-400" id="svg2">

  <rect x="40" y="40" height="60" width="60" style="stroke:green;fill:red">
    <animateTransform
      attributeName="transform"
      begin="0s"
      dur="4s"
      type="rotate"
      from="0 40 40"
      to="360 40 40"
      repeatCount="indefinite" />
  </rect>


  <rect x="40" y="40" width="20" height="20" style="fill:orange;">
    <animateMotion
      path="M0,0 q60,100 100,0 q60,-20 100,0"
      begin="0s"
      dur="4s"
      repeatCount="indefinite" />
  </rect>




	</svg>


</body>
</html>
