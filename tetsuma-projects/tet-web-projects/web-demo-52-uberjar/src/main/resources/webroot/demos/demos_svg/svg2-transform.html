<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/html">
<head>
<meta charset="UTF-8" />
<title>transform</title>


</head>
<body>
	<h3>translate(30) rotate(45 50 50)</h3>

<svg width="600" height="600" style="border:3px solid;">

  <rect x="50" y="50" height="100" width="100" style="stroke:#000; fill: #0086B2"></rect>

  <rect x="50" y="50" height="100" width="100" style="stroke:#000; fill: #0086B2" 
  transform="translate(30) rotate(45 50 50)"></rect>

  <rect x="50" y="150" height="100" width="100" style="stroke:#000; fill: #ff5555" 
  transform="rotate(45 50 150)"></rect>



</svg>

</body>
</html>
